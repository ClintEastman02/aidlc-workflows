name: "user-provided-rules"
version: "1.0.0"
displayName: "User-Provided Rules Injection"
description: "Allows users to specify folder(s) containing their own custom rules (HIPAA, PCI-DSS, OWASP, internal standards, etc.) which are automatically interpreted and injected into every relevant AI-DLC phase"
author: "AI-DLC Team"
category: "quality"

triggers:
  # Always available - users opt in by providing folder paths
  always_available: true
  auto_enable: false

# This extension is unique: it applies to ALL phases.
# Content injection is dynamic based on user-provided rule files,
# not static content files. The overview.md contains the interpretation
# and injection logic the AI model follows.
applies_to:
  inception:
    - stage: "requirements-analysis"
      file: "overview.md"
      action: "append"
    - stage: "user-stories"
      file: "overview.md"
      action: "append"
    - stage: "workflow-planning"
      file: "overview.md"
      action: "append"
    - stage: "application-design"
      file: "overview.md"
      action: "append"
  construction:
    - stage: "functional-design"
      file: "overview.md"
      action: "append"
    - stage: "nfr-requirements"
      file: "overview.md"
      action: "append"
    - stage: "nfr-design"
      file: "overview.md"
      action: "append"
    - stage: "infrastructure-design"
      file: "overview.md"
      action: "append"
    - stage: "code-generation"
      file: "overview.md"
      action: "append"
    - stage: "build-and-test"
      file: "overview.md"
      action: "append"

priority: 10  # High priority - user rules should be considered early
conflicts_with: []
depends_on: []
tags: ["custom-rules", "user-provided", "compliance", "standards", "hipaa", "pci-dss", "gdpr", "internal-standards", "byor"]
